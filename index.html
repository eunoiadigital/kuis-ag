<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Cerdas Cermat Alkitab</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }
        h2 {
            text-align: center;
            color: #1a73e8;
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }
        input[type="text"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #1557b0;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        #halaman-kuis, #halaman-skor {
            display: none;
        }
        .timer {
            font-size: 20px;
            font-weight: bold;
            color: #d93025;
            text-align: center;
            margin-bottom: 15px;
            padding: 5px;
            border: 2px solid #d93025;
            border-radius: 6px;
            background-color: #fce8e6;
        }
        .opsi-container {
            margin-top: 20px;
        }
        .opsi-btn {
            background-color: #f8f9fa;
            color: #333;
            border: 1px solid #dadce0;
            text-align: left;
            margin-bottom: 10px;
            font-weight: normal;
        }
        .opsi-btn:hover:not(:disabled) {
            background-color: #f1f3f4;
        }
        .opsi-btn.terpilih {
            background-color: #e8f0fe;
            border-color: #1a73e8;
            color: #1a73e8;
            font-weight: bold;
        }
        .opsi-btn.salah-waktu {
            background-color: #fce8e6;
            border-color: #d93025;
            color: #d93025;
        }
        .progress {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }
        #loading-text {
            font-weight: bold;
            color: #1a73e8;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- HALAMAN DEPAN: INPUT DATA -->
    <div id="halaman-depan">
        <h2>Pendaftaran Kuis</h2>
        <div class="form-group">
            <label for="input-nama">Nama Lengkap:</label>
            <input type="text" id="input-nama" placeholder="Masukkan nama kamu...">
        </div>
        <div class="form-group">
            <label for="input-gender">Jenis Kelamin:</label>
            <select id="input-gender">
                <option value="">-- Pilih Jenis Kelamin --</option>
                <option value="Laki-laki">Laki-laki</option>
                <option value="Perempuan">Perempuan</option>
            </select>
        </div>
        <button onclick="mulaiKuis()">Mulai Kuis</button>
    </div>

    <!-- HALAMAN KUIS: SOAL & TIMER -->
    <div id="halaman-kuis">
        <div class="progress">Soal <span id="no-soal">1</span> dari 10</div>
        <div class="timer">Sisa Waktu: <span id="detik">15</span> detik</div>
        <h3 id="teks-soal">Pertanyaan akan muncul di sini...</h3>
        
        <div class="opsi-container" id="box-opsi">
            <!-- Pilihan ganda dimunculkan lewat JavaScript -->
        </div>
        
        <button id="next-btn" onclick="soalBerikutnya()" style="margin-top: 15px;" disabled>Jawab Dulu untuk Lanjut</button>
    </div>

    <!-- HALAMAN SKOR: HASIL AKHIR -->
    <div id="halaman-skor">
        <h2>Kuis Selesai!</h2>
        <p style="font-size: 18px; text-align: center;">Halo <span id="hasil-nama"></span>, berikut hasil kuis kamu:</p>
        <hr>
        <p>Benar: <strong id="hasil-benar" style="color: green;">0</strong></p>
        <p>Salah: <strong id="hasil-salah" style="color: red;">0</strong></p>
        <p style="font-size: 20px;">Skor Akhir: <strong id="hasil-skor-akhir" style="color: #1a73e8;">0</strong></p>
        <hr>
        <div id="loading-text">Sedang mengirim skor ke juri...</div>
    </div>
</div>

<script>
    // URL Web App Google Apps Script kamu (TEMPELKAN DI SINI)
    const urlGoogleAppScript = "https://script.google.com/macros/s/AKfycbxtaZhIlRwq0UGCKd0K0wqw_3g6IS7-kuulpr7K7L9TeSaay1c1lu6G7p_X5i_oPwR0/exec"; 

    // 10 Pertanyaan Sulit Cerdas Cermat Alkitab
    const daftarSoal = [
        { pertanyaan: "Siapakah raja Yehuda yang mengalami kesembuhan ajaib dan umurnya diperpanjang Tuhan selama 15 tahun?", pilihan: ["Yosia", "Hizkia", "Manasye", "Ahas"], jawabanBenar: "Hizkia" },
        { pertanyaan: "Di pulau manakah Rasul Yohanes menerima penglihatan yang dituliskan dalam Kitab Wahyu?", pilihan: ["Kreta", "Malta", "Patmos", "Siprus"], jawabanBenar: "Patmos" },
        { pertanyaan: "Siapakah nama anak bungsu dari Yakub yang lahir di jalan menuju Efrata (Betlehem)?", pilihan: ["Yusuf", "Dan", "Gad", "Benyamin"], jawabanBenar: "Benyamin" },
        { pertanyaan: "Dalam Kitab Hakim-hakim, siapakah hakim perempuan satu-satunya yang memimpin bangsa Israel?", pilihan: ["Debora", "Yael", "Rahab", "Rut"], jawabanBenar: "Debora" },
        { pertanyaan: "Kitab apakah yang terletak tepat sebelum Kitab Mikha dalam Perjanjian Lama?", pilihan: ["Yunus", "Yoel", "Amos", "Obaja"], jawabanBenar: "Yunus" },
        { pertanyaan: "Berapa jumlah jala berisi ikan yang ditarik oleh murid-murid setelah kebangkitan Yesus di Danau Tiberias?", pilihan: ["120 ikan", "153 ikan", "70 ikan", "100 ikan"], jawabanBenar: "153 ikan" },
        { pertanyaan: "Siapakah nama istri dari Musa yang merupakan anak dari Yitro, imam di Midian?", pilihan: ["Sipora", "Miryam", "Elisheba", "Ketura"], jawabanBenar: "Sipora" },
        { pertanyaan: "Siapakah nabi yang menegor Raja Daud dengan keras setelah dosa Daud terhadap Uria dan Batsyeba?", pilihan: ["Elia", "Natan", "Samuel", "Gisra"], jawabanBenar: "Natan" },
        { pertanyaan: "Siapakah nama orang yang menggantikan Yudas Iskariot sebagai rasul melalui pembuangan undi?", pilihan: ["Barnabas", "Silas", "Matias", "Timotius"], jawabanBenar: "Matias" },
        { pertanyaan: "Di manakah letak menara Babel dibangun oleh manusia sebelum Tuhan mengacaukan bahasa mereka?", pilihan: ["Tanah Sinear", "Mesir", "Niniwe", "Ur-Kasdim"], jawabanBenar: "Tanah Sinear" }
    ];

    let dataPeserta = { nama: "", gender: "" };
    let indeksSoalSekarang = 0;
    let skorBenar = 0;
    let skorSalah = 0;
    let sisaWaktu = 15;
    let hitunganMundur;
    let jawabanTerpilih = null;
    let waktuHabisStatus = false;

    // Fungsi Mulai Kuis
    function mulaiKuis() {
        dataPeserta.nama = document.getElementById('input-nama').value.trim();
        dataPeserta.gender = document.getElementById('input-gender').value;

        if (dataPeserta.nama === "" || dataPeserta.gender === "") {
            alert("Harap isi Nama Lengkap dan Jenis Kelamin terlebih dahulu!");
            return;
        }

        document.getElementById('halaman-depan').style.display = 'none';
        document.getElementById('halaman-kuis').style.display = 'block';

        tampilkanSoal();
    }

    // Fungsi Menampilkan Soal
    function tampilkanSoal() {
        clearInterval(hitunganMundur);
        jawabanTerpilih = null;
        waktuHabisStatus = false;
        sisaWaktu = 15;
        
        document.getElementById('detik').innerText = sisaWaktu;
        document.getElementById('no-soal').innerText = indeksSoalSekarang + 1;
        document.getElementById('next-btn').disabled = true;
        document.getElementById('next-btn').innerText = "Jawab Dulu untuk Lanjut";

        let soalSekarang = daftarSoal[indeksSoalSekarang];
        document.getElementById('teks-soal').innerText = soalSekarang.pertanyaan;

        let boxOpsi = document.getElementById('box-opsi');
        boxOpsi.innerHTML = "";

        soalSekarang.pilihan.forEach(opsi => {
            let btn = document.createElement('button');
            btn.className = "opsi-btn";
            btn.innerText = opsi;
            btn.onclick = function() { pilihJawaban(btn, opsi); };
            boxOpsi.appendChild(btn);
        });

        // Jalankan Timer
        hitunganMundur = setInterval(function() {
            sisaWaktu--;
            document.getElementById('detik').innerText = sisaWaktu;
            
            if (sisaWaktu <= 0) {
                clearInterval(hitunganMundur);
                pemicuWaktuHabis();
            }
        }, 1000);
    }

    // Fungsi Memilih Jawaban
    function pilihJawaban(tombolTerpilih, teksOpsi) {
        if (waktuHabisStatus) return; // Jika waktu sudah habis, tidak bisa klik lagi

        jawabanTerpilih = teksOpsi;
        
        // Atur efek visual tombol terpilih
        let semuaTombol = document.querySelectorAll('.opsi-btn');
        semuaTombol.forEach(btn => btn.classList.remove('terpilih'));
        tombolTerpilih.classList.add('terpilih');

        // Aktifkan tombol lanjut
        let tombolNext = document.getElementById('next-btn');
        tombolNext.disabled = false;
        tombolNext.innerText = "Lanjutkan";
    }

    // Fungsi Jika Waktu Habis (Otomatis Salah)
    function pemicuWaktuHabis() {
        waktuHabisStatus = true;
        skorSalah++; // Otomatis terhitung salah
        
        // Kunci semua tombol pilihan dan ubah warnanya jadi merah tipis
        let semuaTombol = document.querySelectorAll('.opsi-btn');
        semuaTombol.forEach(btn => {
            btn.disabled = true;
            btn.classList.add('salah-waktu');
        });

        document.getElementById('detik').innerText = "HABIS!";
        
        // Paksa aktifkan tombol untuk lanjut ke soal berikutnya karena sudah dinilai 'Salah'
        let tombolNext = document.getElementById('next-btn');
        tombolNext.disabled = false;
        tombolNext.innerText = "Waktu Habis! Klik untuk Lanjut";
    }

    // Fungsi Tombol Lanjut
    function soalBerikutnya() {
        clearInterval(hitunganMundur);

        // Jika pindah karena menjawab (bukan karena kehabisan waktu)
        if (!waktuHabisStatus) {
            let jawabanBenarAsli = daftarSoal[indeksSoalSekarang].jawabanBenar;
            if (jawabanTerpilih === jawabanBenarAsli) {
                skorBenar++;
            } else {
                skorSalah++;
            }
        }

        indeksSoalSekarang++;

        if (indeksSoalSekarang < daftarSoal.length) {
            tampilkanSoal();
        } else {
            selesaiKuis();
        }
    }

    // Fungsi Selesai Kuis & Kirim Real-time ke Google
    function selesaiKuis() {
        document.getElementById('halaman-kuis').style.display = 'none';
        document.getElementById('halaman-skor').style.display = 'block';

        let totalSkor = skorBenar * 10; // 1 soal bernilai 10 poin, max 100

        document.getElementById('hasil-nama').innerText = dataPeserta.nama;
        document.getElementById('hasil-benar').innerText = skorBenar;
        document.getElementById('hasil-salah').innerText = skorSalah;
        document.getElementById('hasil-skor-akhir').innerText = totalSkor;

        // Kirim Paket Data ke Google Sheets
        const paketData = {
            nama: dataPeserta.nama,
            gender: dataPeserta.gender,
            correct: skorBenar,
            wrong: skorSalah,
            score: totalSkor
        };

        fetch(urlGoogleAppScript, {
            method: "POST",
            mode: "no-cors",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(paketData)
        })
        .then(() => {
            document.getElementById('loading-text').innerHTML = "<span style='color: green;'>✓ Skor berhasil disimpan ke Admin secara Real-time!</span>";
        })
        .catch((error) => {
            console.error("Gagal mengirim data:", error);
            document.getElementById('loading-text').innerHTML = "<span style='color: red;'>⚠️ Gagal mengirim skor otomatis. Laporkan ke panitia.</span>";
        });
    }
</script>

</body>
</html>
