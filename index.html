<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Cerdas Cermat Alkitab</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin:0; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; box-sizing: border-box; }
        h2 { text-align: center; color: #1a73e8; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input[type="text"], select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #1a73e8; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        .timer { font-size: 20px; font-weight: bold; color: #d93025; text-align: center; margin-bottom: 15px; padding: 5px; border: 2px solid #d93025; border-radius: 6px; background-color: #fce8e6; }
        .opsi-btn { width: 100%; padding: 12px; background-color: #f8f9fa; color: #333; border: 1px solid #dadce0; text-align: left; margin-bottom: 10px; border-radius: 6px; font-size: 16px; cursor: pointer; transition: background 0.2s; }
        
        /* WARNA STATUS JAWABAN */
        .opsi-btn.benar { background-color: #2db757 !important; border-color: #259647 !important; color: white !important; font-weight: bold; }
        .opsi-btn.salah { background-color: #e53935 !important; border-color: #b71c1c !important; color: white !important; }
        .opsi-btn.salah-waktu { background-color: #fce8e6; border-color: #d93025; color: #d93025; }
        
        .progress { text-align: center; font-size: 14px; color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <!-- HALAMAN DEPAN -->
    <div id="halaman-depan">
        <h2>Pendaftaran Kuis</h2>
        <div class="form-group">
            <label>Nama Lengkap:</label>
            <input type="text" id="input-nama" placeholder="Masukkan nama kamu...">
        </div>
        <div class="form-group">
            <label>Jenis Kelamin:</label>
            <select id="input-gender">
                <option value="">-- Pilih --</option>
                <option value="Laki-laki">Laki-laki</option>
                <option value="Perempuan">Perempuan</option>
            </select>
        </div>
        <button onclick="goToReadyScreen()">Mulai Kuis</button>
    </div>

    <!-- HALAMAN KUIS -->
    <div id="halaman-kuis" style="display: none;">
        <div class="progress">Soal <span id="no-soal">1</span> dari 10</div>
        <div class="timer">Sisa Waktu: <span id="detik">15</span> detik</div>
        <h3 id="teks-soal">Pertanyaan...</h3>
        <div id="box-opsi"></div>
        <button id="next-btn" onclick="soalBerikutnya()" style="margin-top: 15px;" disabled>Pilih Jawaban Dulu</button>
    </div>

    <!-- HALAMAN SKOR -->
    <div id="halaman-skor" style="display: none;">
        <h2>Kuis Selesai!</h2>
        <p style="text-align: center;">Halo <span id="hasil-nama"></span>, skor kamu:</p>
        <p>Benar: <strong id="hasil-benar" style="color: green;">0</strong></p>
        <p>Salah: <strong id="strong-salah" style="color: red;">0</strong></p>
        <p style="font-size: 20px;">Skor Akhir: <strong id="hasil-skor-akhir" style="color: #1a73e8;">0</strong></p>
        <div id="loading-text" style="font-weight:bold; color:#1a73e8; text-align:center;">Sedang mengirim skor...</div>
    </div>
</div>

<script>
    // MASUKKAN URL WEB APP GOOGLE APPS SCRIPT KAMU DI SINI
    const urlGoogleAppScript = "https://script.google.com/macros/s/AKfycbxtaZhIlRwq0UGCKd0K0wqw_3g6IS7-kuulpr7K7L9TeSaay1c1lu6G7p_X5i_oPwR0/exec"; 

    const daftarSoal = [
        { pertanyaan: "Siapakah raja Yehuda yang umurnya diperpanjang Tuhan selama 15 tahun?", pilihan: ["Yosia", "Hizkia", "Manasye", "Ahas"], jawabanBenar: "Hizkia" },
        { pertanyaan: "Di pulau manakah Rasul Yohanes menerima penglihatan Kitab Wahyu?", pilihan: ["Kreta", "Malta", "Patmos", "Siprus"], jawabanBenar: "Patmos" },
        { pertanyaan: "Siapakah nama anak bungsu dari Yakub?", pilihan: ["Yusuf", "Dan", "Gad", "Benyamin"], jawabanBenar: "Benyamin" },
        { pertanyaan: "Siapakah hakim perempuan satu-satunya yang memimpin bangsa Israel?", pilihan: ["Debora", "Yael", "Rahab", "Rut"], jawabanBenar: "Debora" },
        { pertanyaan: "Kitab apakah yang terletak tepat sebelum Kitab Mikha?", pilihan: ["Yunus", "Yoel", "Amos", "Obaja"], jawabanBenar: "Yunus" },
        { pertanyaan: "Berapa jumlah ikan yang ditarik oleh murid-murid di Danau Tiberias?", pilihan: ["120 ikan", "153 ikan", "70 ikan", "100 ikan"], jawabanBenar: "153 ikan" },
        { pertanyaan: "Siapakah nama istri dari Musa?", pilihan: ["Sipora", "Miryam", "Elisheba", "Ketura"], jawabanBenar: "Sipora" },
        { pertanyaan: "Siapakah nabi yang menegor Raja Daud setelah dosa dengan Batsyeba?", pilihan: ["Elia", "Natan", "Samuel", "Gisra"], jawabanBenar: "Natan" },
        { pertanyaan: "Siapakah nama orang yang menggantikan Yudas Iskariot sebagai rasul?", pilihan: ["Barnabas", "Silas", "Matias", "Timotius"], jawabanBenar: "Matias" },
        { pertanyaan: "Di manakah letak menara Babel dibangun oleh manusia?", pilihan: ["Tanah Sinear", "Mesir", "Niniwe", "Ur-Kasdim"], jawabanBenar: "Tanah Sinear" }
    ];

    let dataPeserta = { nama: "", gender: "" };
    let indeksSoalSekarang = 0;
    let skorBenar = 0;
    let skorSalah = 0;
    let sisaWaktu = 15;
    let hitunganMundur;
    let sudahMenjawab = false;

    function goToReadyScreen() {
        const namaInput = document.getElementById('input-nama').value.trim();
        const genderInput = document.getElementById('input-gender').value;

        if (namaInput === "" || genderInput === "") {
            alert("Harap isi Nama Lengkap dan Jenis Kelamin terlebih dahulu!");
            return;
        }

        dataPeserta.nama = namaInput;
        dataPeserta.gender = genderInput;

        document.getElementById('halaman-depan').style.display = 'none';
        document.getElementById('halaman-kuis').style.display = 'block';

        tampilkanSoal();
    }

    function tampilkanSoal() {
        clearInterval(hitunganMundur);
        sudahMenjawab = false;
        sisaWaktu = 15;
        
        document.getElementById('detik').innerText = sisaWaktu;
        document.getElementById('no-soal').innerText = indeksSoalSekarang + 1;
        document.getElementById('next-btn').disabled = true;
        document.getElementById('next-btn').innerText = "Pilih Jawaban Dulu";

        let soalSekarang = daftarSoal[indeksSoalSekarang];
        document.getElementById('teks-soal').innerText = soalSekarang.pertanyaan;

        let boxOpsi = document.getElementById('box-opsi');
        boxOpsi.innerHTML = "";

        soalSekarang.pilihan.forEach(opsi => {
            let btn = document.createElement('button');
            btn.className = "opsi-btn";
            btn.innerText = opsi;
            btn.onclick = function() { cekJawaban(btn, opsi); };
            boxOpsi.appendChild(btn);
        });

        hitunganMundur = setInterval(function() {
            sisaWaktu--;
            document.getElementById('detik').innerText = sisaWaktu;
            
            if (sisaWaktu <= 0) {
                clearInterval(hitunganMundur);
                pemicuWaktuHabis();
            }
        }, 1000);
    }

    function cekJawaban(tombolTerpilih, teksOpsi) {
        // Jika waktu habis atau sudah pernah klik, kunci fungsi klik
        if (sudahMenjawab || sisaWaktu <= 0) return; 
        
        clearInterval(hitunganMundur); // Stop waktu jika peserta klik jawaban
        sudahMenjawab = true;

        let jawabanBenarAsli = daftarSoal[indeksSoalSekarang].jawabanBenar;
        let semuaTombol = document.querySelectorAll('.opsi-btn');

        // Kunci semua tombol agar tidak bisa diklik lagi
        semuaTombol.forEach(btn => btn.disabled = true);

        if (teksOpsi === jawabanBenarAsli) {
            // Jika Benar -> Hijau
            tombolTerpilih.classList.add('benar');
            skorBenar++;
        } else {
            // Jika Salah -> Merah pada yang dipilih
            tombolTerpilih.classList.add('salah');
            skorSalah++;

            // Cari tombol yang isinya jawaban benar, lalu beri warna Hijau sebagai petunjuk
            semuaTombol.forEach(btn => {
                if (btn.innerText === jawabanBenarAsli) {
                    btn.classList.add('benar');
                }
            });
        }

        // Aktifkan tombol untuk lanjut
        let tombolNext = document.getElementById('next-btn');
        tombolNext.disabled = false;
        tombolNext.innerText = "Lanjutkan";
    }

    function pemicuWaktuHabis() {
        sudahMenjawab = true;
        skorSalah++;
        
        let jawabanBenarAsli = daftarSoal[indeksSoalSekarang].jawabanBenar;
        let semuaTombol = document.querySelectorAll('.opsi-btn');

        semuaTombol.forEach(btn => {
            btn.disabled = true;
            // Warnai hijau pada jawaban yang benar agar peserta tahu kunci jawabannya
            if (btn.innerText === jawabanBenarAsli) {
                btn.classList.add('benar');
            } else {
                btn.classList.add('salah-waktu');
            }
        });

        document.getElementById('detik').innerText = "HABIS!";
        let tombolNext = document.getElementById('next-btn');
        tombolNext.disabled = false;
        tombolNext.innerText = "Waktu Habis! Klik untuk Lanjut";
    }

    function soalBerikutnya() {
        indeksSoalSekarang++;
        if (indeksSoalSekarang < daftarSoal.length) {
            tampilkanSoal();
        } else {
            selesaiKuis();
        }
    }

    function selesaiKuis() {
        document.getElementById('halaman-kuis').style.display = 'none';
        document.getElementById('halaman-skor').style.display = 'block';

        let totalSkor = skorBenar * 10;
        document.getElementById('hasil-nama').innerText = dataPeserta.nama;
        document.getElementById('hasil-benar').innerText = skorBenar;
        document.getElementById('strong-salah').innerText = skorSalah;
        document.getElementById('hasil-skor-akhir').innerText = totalSkor;

        fetch(urlGoogleAppScript, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                nama: dataPeserta.nama,
                gender: dataPeserta.gender,
                correct: skorBenar,
                wrong: skorSalah,
                score: totalSkor
            })
        })
        .then(() => {
            document.getElementById('loading-text').innerHTML = "<span style='color: green;'>✓ Skor disimpan ke Admin!</span>";
        })
        .catch((error) => {
            document.getElementById('loading-text').innerHTML = "<span style='color: red;'>⚠️ Gagal mengirim skor otomatis. Laporkan panitia.</span>";
        });
    }
</script>
</body>
</html>
